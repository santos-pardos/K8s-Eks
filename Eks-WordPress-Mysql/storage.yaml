apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-gp3
provisioner: ebs.csi.aws.com # Llama directamente al EBS CSI Driver
volumeBindingMode: WaitForFirstConsumer # Clave en AWS: Espera a crear el disco en la misma zona de disponibilidad (AZ) donde caiga el Pod
parameters:
  type: gp3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim # El nombre exacto que busca tu Deployment de MySQL
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3 # Vinculado a nuestra clase gp3
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wp-pv-claim # El nombre exacto que busca tu Deployment de WordPress
  labels:
    app: wordpress
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3 # Vinculado a nuestra clase gp3
  resources:
    requests:
      storage: 10Gi
