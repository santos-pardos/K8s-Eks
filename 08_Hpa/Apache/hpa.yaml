apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mi-web-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mi-web # A qué aplicación vigila
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Objetivo: 50% de uso de CPU
