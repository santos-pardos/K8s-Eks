apiVersion: v1
kind: Namespace
metadata:
  name: fintech-apps

---
# Secretos de la Base de Datos (Codificados en Base64)
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: fintech-apps
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM= # postgres
  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM= # password123
  POSTGRES_DB: dG9kb3M= # todos

---
# Configuración global de la aplicación
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: fintech-apps
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  NODE_ENV: "production"